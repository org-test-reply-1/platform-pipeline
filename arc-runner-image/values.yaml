githubConfigUrl: "https://github.com/org-test-reply-1"
githubConfigSecret: arc-github-secret

controllerServiceAccount:
  namespace: arc-system
  name: arc-gha-rs-controller

template:
  spec:
    initContainers:
      - name: init-dind-externals
        image: ghcr.io/org-test-reply-1/aks-arc-runner:latest
        command: ["cp", "-r", "-v", "/home/runner/externals/.", "/home/runner/tmpDir/"]
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir

    containers:
      - name: runner
        image: ghcr.io/org-test-reply-1/aks-arc-runner:latest
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals

      - name: dind
        image: docker:dind
        securityContext:
          privileged: true        # necessario per DinD
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals

    volumes:
      - name: work
        emptyDir: {}
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
